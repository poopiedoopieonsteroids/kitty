font_family      DepartureMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
enable_audio_bell no
font_size 8.0
window_padding_width 25
window_margin_width 0
single_window_margin_width 0
window_border_width 0pt
draw_minimal_borders yes
include theme.conf
cursor_trail 1
background_opacity 0.05
#hide_window_decorations yes
#confirm_os_window_close 0

# initially empty, to be configured by user and remains static
include userprefs.conf

# Note: as userprefs.conf is included at the end, settings configured in this file will override the defaults


# BEGIN_KITTY_THEME
# Black Metal
include current-theme.conf
# END_KITTY_THEME

# Disable "confirm on close" dialog
confirm_exit no

# Disable "confirm on close" dialog
confirm_exit yes

confirm_os_window_close 0
